services:
  postgres:
    image: postgres:16
    container_name: yaha-postgres
    environment:
      POSTGRES_USER: yaha
      POSTGRES_PASSWORD: yaha_password
      POSTGRES_DB: yaha_game
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: yaha-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: yaha_minio
      MINIO_ROOT_PASSWORD: yaha_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis/redis-stack:7.2.0-v3
    container_name: yaha-redis
    command: >
      redis-server
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
      --requirepass yaha_redis_password
      --loadmodule /opt/redis-stack/lib/redisearch.so
      --loadmodule /opt/redis-stack/lib/rejson.so
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  minio_data:
  redis_data: